# Runs the test suite on every push and pull request.
# This is the "green check" you'll see on your PR — the same `pytest`
# you can run locally, executed by GitHub on a fresh machine.
name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: pytest -v
