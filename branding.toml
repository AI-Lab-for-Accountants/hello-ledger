# 🎨 Make it yours!
#
# This file is the "Add your branding" exercise: the app ships wearing the
# AI Lab for Accountants brand — replace these values on YOUR fork and it
# becomes your firm's. (Colors live in .streamlit/config.toml — swap
# primaryColor there to match your brand.)

[app]
name = "hello-ledger"
tagline = "A tiny general ledger for learning GitHub"

[firm]
# Put your firm's name here — it appears in the sidebar.
name = "AI Lab for Accountants"
# Path to a small logo image (PNG/SVG) committed to your fork.
# Swap in your own, or set to "" for no logo.
logo = "assets/alfa-flask.svg"
